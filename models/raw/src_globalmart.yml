version: 2

sources:
  - name: globalmart
    description: a clone of the snowflake database
    database: raw
    schema: globalmart
    tables:
      - name: customer
        description: "Customer master data"

      - name: orders
        description: raw orders table
        columns:
          - name: orderid
            description: primary key for orders
            tests:
              - unique
              - not_null

      - name: product